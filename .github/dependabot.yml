version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /alerts
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      alerts-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /scripts
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      scripts-dependencies:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /contracts/strategies/blend_leverage
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      blend-leverage-dependencies:
        patterns:
          - "*"
